name: RWTable Split Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  split-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove checkout auth header
        run: git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Configure git identity
        run: |
          git config user.name "rwtable-bot"
          git config user.email "rwtable-bot@users.noreply.github.com"

      - name: Split and sync package mirrors
        env:
          RWTABLE_MIRROR_TOKEN: ${{ secrets.RWTABLE_MIRROR_TOKEN }}
          RWTABLE_VUE_REPO: RUDIWER/rwtable-vue
          RWTABLE_LARAVEL_REPO: RUDIWER/rwtable-laravel
          DEFAULT_BRANCH: main
        run: bash scripts/split/sync-mirrors.sh
